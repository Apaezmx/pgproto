syntax = "proto3";

package conformance;

message ConformanceMsg {
  double f_double = 1;
  float f_float = 2;
  int64 f_int64 = 3;
  uint64 f_uint64 = 4;
  int32 f_int32 = 5;
  fixed64 f_fixed64 = 6;
  fixed32 f_fixed32 = 7;
  bool f_bool = 8;
  string f_string = 9;
  bytes f_bytes = 10;
  uint32 f_uint32 = 11;
  sfixed32 f_sfixed32 = 12;
  sfixed64 f_sfixed64 = 13;
  sint32 f_sint32 = 14;
  sint64 f_sint64 = 15;

  repeated int32 r_int32 = 16;
  repeated int32 r_int32_packed = 17 [packed = true];
  repeated string r_string = 18;

  map<string, string> m_str_str = 19;
  map<int32, int32> m_int_int = 20;

  oneof choice {
    int32 c_int = 21;
    string c_str = 22;
  }

  message Nested {
    int32 val = 1;
    Nested inner = 2;
  }
  Nested f_nested = 23;
}
