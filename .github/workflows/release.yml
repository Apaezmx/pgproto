name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:

  build-binaries:
    strategy:
      matrix:
        pg_version: [15, 16, 17, 18]
    runs-on: ubuntu-latest
    env:
      PG_CONFIG: /usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config


    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true
        lfs: false

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libprotobuf-c-dev protobuf-c-compiler

    - name: Setup PostgreSQL ${{ matrix.pg_version }}
      run: |
        sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
        sudo apt-get update
        sudo apt-get install -y postgresql-${{ matrix.pg_version }} postgresql-server-dev-${{ matrix.pg_version }}

    - name: Build
      run: |
        make clean
        make

    - name: Package Binary
      run: |
        mkdir -p dist
        cp pgproto.so dist/
        cp sql/pgproto--1.0.sql dist/
        cp pgproto.control dist/
        zip -r pgproto-pg${{ matrix.pg_version }}-linux-x86_64.zip dist/

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: pgproto-pg${{ matrix.pg_version }}-linux-x86_64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  source-distribution:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true

    - name: Package Source Bundle for PGXN
      run: |
        mkdir -p dist/pgproto-0.2.4
        # Copy source files
        cp -R src/ dist/pgproto-0.2.4/
        cp -R sql/ dist/pgproto-0.2.4/
        cp Makefile dist/pgproto-0.2.4/
        cp pgproto.control dist/pgproto-0.2.4/
        cp META.json dist/pgproto-0.2.4/
        cp LICENSE dist/pgproto-0.2.4/
        cp README.md dist/pgproto-0.2.4/
        # Zip it
        cd dist && zip -r ../pgproto-0.2.4.zip pgproto-0.2.4/

    - name: Upload Source Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: pgproto-0.2.4.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true
    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: example/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        pg_version: [15, 16, 17]
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: |
          make
          zip
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-protobuf-c
    - name: Install PostgreSQL
      run: |
        choco install postgresql${{ matrix.pg_version }} --force --params '/Password:root'
      shell: powershell
    - name: Build
      run: |
        export PG_CONFIG="/c/Program Files/PostgreSQL/${{ matrix.pg_version }}/bin/pg_config"
        make
      shell: msys2 {0}
    - name: Package Binary
      run: |
        mkdir -p dist
        cp pgproto.dll dist/ || cp pgproto.so dist/
        cp sql/pgproto--1.0.sql dist/
        cp pgproto.control dist/
        zip -r pgproto-pg${{ matrix.pg_version }}-windows-x86_64.zip dist/
      shell: msys2 {0}
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: pgproto-pg${{ matrix.pg_version }}-windows-x86_64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
