name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libprotobuf-c-dev protobuf-c-compiler lcov valgrind

    - name: Setup PostgreSQL 18
      run: |
        sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
        sudo apt-get update
        sudo apt-get install -y postgresql-18 postgresql-server-dev-18

    - name: Build
      run: |
        make clean
        make

    - name: Install
      run: |
        sudo make install

    - name: Start PostgreSQL
      run: |
        sudo systemctl start postgresql

    - name: Run Regression Tests
      run: |
        make installcheck

    - name: Run Coverage with lcov
      run: |
        make clean
        make COPT="-O0 -fprofile-arcs -ftest-coverage"
        sudo make install
        make installcheck
        lcov --capture --directory . --output-file coverage.info --ignore-errors negative,inconsistent
        lcov --list coverage.info
