name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PG_CONFIG: /usr/lib/postgresql/18/bin/pg_config
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libprotobuf-c-dev protobuf-c-compiler lcov valgrind

    - name: Stop pre-existing PostgreSQL services
      run: |
        sudo systemctl stop postgresql || true
        # Also stop any specific clusters if systemctl doesn't catch them all
        sudo pg_dropcluster 16 main || true

    - name: Setup PostgreSQL 18
      run: |
        sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
        sudo apt-get update
        sudo apt-get install -y postgresql-18 postgresql-server-dev-18

    - name: Build
      run: |
        make clean
        make

    - name: Install
      run: |
        sudo make install

    - name: Start PostgreSQL 18 & Diagnose
      run: |
        # Explicitly start cluster 18/main so we know exactly what port it uses
        sudo pg_ctlcluster 18 main start || true
        # Log all running clusters for debugging
        pg_lsclusters

    - name: Create runner role
      run: |
        sudo -u postgres createuser -s runner

    - name: Run Regression Tests
      run: |
        make installcheck

    - name: Upload Test Diff on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: regression-diffs
        path: |
          results/
          regression.diffs
          regression.out

    - name: Run Coverage with lcov
      run: |
        make clean
        make COPT="-O0 -fprofile-arcs -ftest-coverage"
        sudo make install
        # Grant permissions so the postgres server user can traverse into here
        sudo chmod o+x /home/runner
        sudo chmod o+x /home/runner/work
        sudo chmod -R 777 .
        make installcheck
        # Stop the server to force it to flush all .gcda profile data!
        sudo pg_ctlcluster 18 main stop || true
        lcov --capture --directory . --output-file coverage.info --ignore-errors negative,inconsistent --ignore-errors empty
        lcov --list coverage.info
