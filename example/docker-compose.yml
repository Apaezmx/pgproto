services:
  db:
    build:
      context: ..
      dockerfile: example/Dockerfile
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: pgproto_showcase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - ..:/workspace
      - ./initdb.d:/docker-entrypoint-initdb.d
    working_dir: /workspace
